name: Test CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel previous runs on same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─── Smoke tests (fast feedback gate) ─────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke tests
        run: pnpm test:smoke
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:3000' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload smoke results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results
          path: |
            playwright-report/
            allure-results/
          retention-days: 7

  # ─── API tests (runs parallel with smoke) ─────────────────────────
  api:
    name: API Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: pnpm test:api
        env:
          CI: true
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:3001/api' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload API results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-results
          path: allure-results/
          retention-days: 7

  # ─── Regression tests — waits for smoke gate ──────────────────────
  regression:
    name: Regression [${{ matrix.shard }}/${{ matrix.total }}]
    runs-on: self-hosted
    needs: [smoke]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run regression shard ${{ matrix.shard }}/${{ matrix.total }}
        run: pnpm test:regression --shard=${{ matrix.shard }}/${{ matrix.total }}
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:3000' }}
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:3001/api' }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}

      - name: Upload regression results (shard ${{ matrix.shard }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-results-shard-${{ matrix.shard }}
          path: allure-results/
          retention-days: 7

  # ─── Merge allure results & publish report ─────────────────────────
  report:
    name: Publish Allure Report
    runs-on: self-hosted
    needs: [smoke, regression, api]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/

      - name: Merge allure results
        run: |
          mkdir -p merged-allure-results
          find all-results -name "*.json" -exec cp {} merged-allure-results/ \; 2>/dev/null || true

      - name: Generate Allure report
        run: allure generate merged-allure-results --clean -o allure-report

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
